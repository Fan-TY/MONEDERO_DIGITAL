<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukita - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="text-center mb-4">
                    <a th:href="@{/}" class="text-decoration-none d-inline-flex align-items-center text-white fs-1 fw-bold">
                        <i class="bi bi-coin text-electric-blue me-2"></i>Lukita
                    </a>
                    <p class="text-muted-dark mt-1">Tu lukita segura y multibanco</p>
                </div>

                <div class="bg-card-dark p-4 rounded-4 shadow border border-dark">
                    <h3 class="fw-bold text-white mb-4 text-center">Ingresar</h3>

                    <div th:if="${mensajeExito}" class="alert alert-success bg-success bg-opacity-10 text-success border border-success border-opacity-20 py-2 small mb-3" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span th:text="${mensajeExito}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-10 text-danger border border-danger border-opacity-20 py-2 small mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/login}" method="POST">

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted-dark small">Número de DNI</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-muted-dark border-end-0">
                                    <i class="bi bi-card-text"></i>
                                </span>
                                <input type="text" name="dni" class="form-control bg-dark border-secondary text-white border-start-0 ps-0 rounded-end-3"
                                    placeholder="Ingresa tu DNI" required maxlength="8" pattern="\d{8}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted-dark small">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-muted-dark border-end-0">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" name="password" class="form-control bg-dark border-secondary text-white border-start-0 ps-0 rounded-end-3"
                                    placeholder="Contraseña de acceso" required>
                            </div>
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-cta btn-lg fw-bold shadow rounded-pill fs-6 py-3">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
                            </button>
                        </div>

                        <div class="text-center small mb-2">
                            <span class="text-muted-dark">¿Nuevo en Lukita?</span>
                            <a th:href="@{/registro}" class="text-electric-blue fw-bold text-decoration-none ms-1">Regístrate aquí</a>
                        </div>

                        <div class="text-center mt-3 border-top border-dark pt-3">
                            <a th:href="@{/}" class="text-muted-dark small text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i> Volver al Inicio
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
