<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukita - Retirar en Agente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="min-vh-100 py-3">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-card-dark shadow border-bottom border-dark rounded-4 mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-inline-flex align-items-center text-white me-4" href="/perfil">
            <i class="bi bi-coin text-electric-blue me-2"></i>Lukita
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <a class="nav-link text-muted-dark fw-semibold" href="/perfil">
                        <i class="bi bi-person-circle me-1"></i> Mi Perfil
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active fw-semibold text-white border-bottom border-electric-blue" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-arrow-left-right me-1"></i> Transacciones
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark bg-card-dark border border-dark shadow">
                        <li>
                            <a class="dropdown-item text-white" href="/recargar">
                                <i class="bi bi-plus-circle-dotted me-2 text-electric-blue"></i> Recargar
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item text-white active" href="/retirar">
                                <i class="bi bi-cash-stack me-2 text-electric-blue"></i> Retirar
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex">
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm fw-bold rounded-pill px-3">
                    <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <div th:if="${mensajeExito}" class="alert alert-success bg-success bg-opacity-10 text-success border border-success border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensajeExito}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-10 text-danger border border-danger border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-shield-exclamation me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-7">
            <div class="bg-card-dark p-4 rounded-4 shadow border border-dark">
                <h5 class="mb-4 fw-bold text-white d-flex align-items-center">
                    <i class="bi bi-cash-stack me-2 text-electric-blue"></i> Retirar en Agente
                </h5>

                <form th:action="@{/retirar}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Cuenta de origen</label>
                        <select class="form-select bg-dark border-secondary text-white rounded-3" name="numeroCuenta" required>
                            <option value="" disabled selected>Selecciona una cuenta...</option>
                            <option th:each="cuenta : ${cuentas}"
                                    th:value="${cuenta.numeroCuenta}"
                                    th:text="${cuenta.banco} + ' — ' + ${cuenta.numeroCuenta} + ' (S/ ' + ${#numbers.formatDecimal(cuenta.saldo, 1, 'COMMA', 2, 'POINT')} + ')'">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Agente o cajero</label>
                        <select class="form-select bg-dark border-secondary text-white rounded-3" name="codigoAgente" required>
                            <option value="" disabled selected>Selecciona un agente...</option>
                            <option th:each="agente : ${agentes}"
                                    th:value="${agente.codigoAgente}"
                                    th:text="${agente.nombreComercial} + ' — ' + ${agente.ubicacion}">
                            </option>
                        </select>
                        <div th:if="${#lists.isEmpty(agentes)}" class="form-text text-warning small mt-1">
                            No hay agentes disponibles registrados en el sistema.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Monto a retirar (S/.)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control bg-dark border-secondary text-white rounded-3"
                               name="monto" required placeholder="0.00">
                    </div>

                    <!-- Validación biométrica (simulada) -->
                    <div class="form-check bg-dark bg-opacity-50 rounded-3 p-3 mb-4 border border-secondary">
                        <input class="form-check-input" type="checkbox" value="true" name="biometriaValida" id="biometriaValida" required>
                        <label class="form-check-label text-white small fw-semibold" for="biometriaValida">
                            <i class="bi bi-fingerprint text-electric-blue me-1"></i>
                            Confirmo mi identidad mediante validación biométrica
                        </label>
                    </div>

                    <button type="submit" class="btn btn-electric-blue fw-bold rounded-pill px-4 w-100">
                        <i class="bi bi-cash-coin me-1"></i> Confirmar Retiro
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
