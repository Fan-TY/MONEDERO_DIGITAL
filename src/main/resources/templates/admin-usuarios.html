<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukita - Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="min-vh-100 py-3">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-card-dark shadow border-bottom border-dark rounded-4 mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-inline-flex align-items-center text-white me-4" href="/perfil">
            <i class="bi bi-coin text-electric-blue me-2"></i>Lukita
        </a>
        <div class="d-flex">
            <a th:href="@{/perfil}" class="btn btn-outline-light btn-sm fw-bold rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i> Volver al Perfil
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <h4 class="fw-bold text-white mb-1">
        <i class="bi bi-shield-lock-fill me-2 text-electric-blue"></i> Panel de Administración
    </h4>
    <p class="text-muted-dark mb-4">Gestión de estados de usuarios (STATE): activa, suspende o bloquea cuentas.</p>

    <div th:if="${mensajeExito}" class="alert alert-success bg-success bg-opacity-10 text-success border border-success border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensajeExito}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-10 text-danger border border-danger border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-shield-exclamation me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="bg-card-dark rounded-4 shadow border border-dark mb-4">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0 custom-table-dark">
                <thead class="text-muted-dark small text-uppercase" style="background-color: rgba(0,0,0,0.2);">
                    <tr>
                        <th class="ps-4 py-3 border-dark">Nombre</th>
                        <th class="py-3 border-dark">DNI</th>
                        <th class="py-3 border-dark">Tipo</th>
                        <th class="py-3 border-dark">Estado Actual</th>
                        <th class="text-end pe-4 py-3 border-dark">Cambiar Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}" class="border-dark">
                        <td class="ps-4 py-3 fw-semibold text-white" th:text="${u.nombre}">Nombre</td>
                        <td class="py-3"><code class="text-electric-blue" th:text="${u.dni}">00000000</code></td>
                        <td class="py-3 small text-muted-dark" th:text="${u.tipoUsuario}">CLIENTE</td>
                        <td class="py-3">
                            <span th:class="'badge bg-' + ${u.estado.colorBootstrap} + ' bg-opacity-20 text-white border border-' + ${u.estado.colorBootstrap} + ' border-opacity-25 rounded-pill px-3 py-1'">
                                <i th:class="'bi ' + ${u.estado.iconoBootstrap} + ' me-1'"></i>
                                <span th:text="${u.estado.etiqueta}">Estado</span>
                            </span>
                        </td>
                        <td class="text-end pe-4 py-3">
                            <form th:action="@{/admin/usuarios/cambiar-estado}" method="POST" class="d-flex gap-2 justify-content-end">
                                <input type="hidden" name="dni" th:value="${u.dni}">
                                <select name="nuevoEstado" class="form-select form-select-sm bg-dark border-secondary text-white rounded-3" style="width: auto;">
                                    <option th:each="e : ${estados}"
                                            th:value="${e}"
                                            th:text="${e.etiqueta}"
                                            th:selected="${e == u.estado}">
                                    </option>
                                </select>
                                <button type="submit" class="btn btn-electric-blue btn-sm fw-bold rounded-pill px-3">
                                    <i class="bi bi-arrow-repeat me-1"></i> Aplicar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="5" class="text-center py-5 text-muted-dark">No hay usuarios registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
