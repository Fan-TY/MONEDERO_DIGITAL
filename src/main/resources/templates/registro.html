<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukita - Registro Multibanco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center py-5 min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="text-center mb-4">
                    <a th:href="@{/}" class="text-decoration-none d-inline-flex align-items-center text-white fs-2 fw-bold">
                        <i class="bi bi-coin text-electric-blue me-2"></i>Lukita
                    </a>
                    <p class="text-muted-dark mt-1">Crea tu perfil único de gestión multibanco</p>
                </div>

                <div class="bg-card-dark p-4 rounded-4 shadow border border-dark">
                    <h4 class="fw-bold text-white mb-4 text-center">Registrar Nueva Cuenta</h4>

                    <div th:if="${error}" class="alert alert-danger bg-danger-subtle text-danger border-0 small mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> 
                        <span th:text="${error}">Mensaje de error</span>
                    </div>

                    <form th:action="@{/registro}" th:object="${usuario}" method="POST">
                        
                        <h6 class="text-electric-blue fw-bold mb-3 border-bottom border-dark pb-2">
                            <i class="bi bi-person-badge-fill me-1"></i> 1. Datos Personales
                        </h6>
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label text-muted-dark small fw-semibold">Nombres Completos</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white rounded-3" 
                                   id="nombre" th:field="*{nombre}" required placeholder="Ej. Juan Pérez">
                        </div>

                        <div class="mb-3">
                            <label for="dni" class="form-label text-muted-dark small fw-semibold">Número de DNI</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white rounded-3" 
                                   id="dni" th:field="*{dni}" maxlength="8" pattern="\d{8}" required placeholder="Ingresa tus 8 dígitos">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label text-muted-dark small fw-semibold">Contraseña de Acceso</label>
                            <input type="password" class="form-control bg-dark border-secondary text-white rounded-3" 
                                   id="password" th:field="*{password}" required placeholder="Crea una contraseña segura">
                        </div>

                        <h6 class="text-electric-blue fw-bold mt-4 mb-3 border-bottom border-dark pb-2">
                            <i class="bi bi-bank me-1"></i> 2. Vincular Primera Cuenta Bancaria
                        </h6>

                        <div class="mb-3">
                            <label for="banco" class="form-label text-muted-dark small fw-semibold">Selecciona tu Banco</label>
                            <select class="form-select bg-dark border-secondary text-white rounded-3" id="banco" name="banco" required>
                                <option value="" disabled selected>Elige una entidad financiera...</option>
                                <option value="BCP">BCP (Banco de Crédito)</option>
                                <option value="Interbank">Interbank</option>
                                <option value="BBVA">BBVA</option>
                                <option value="Scotiabank">Scotiabank</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="numeroCuenta" class="form-label text-muted-dark small fw-semibold">Número de Cuenta Bancaria</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white rounded-3" 
                                   id="numeroCuenta" name="numeroCuenta" required placeholder="Ej. 191-XXXXXXXX-X-XX">
                        </div>

                        <div class="mb-4">
                            <label for="saldo" class="form-label text-muted-dark small fw-semibold">Saldo Inicial Disponible (S/.)</label>
                            <input type="number" step="0.01" class="form-control bg-dark border-secondary text-white rounded-3" 
                                   id="saldo" name="saldo" required placeholder="0.00">
                        </div>

                        <button type="submit" class="btn btn-cta w-100 py-2.5 fw-bold rounded-pill mb-3 shadow">
                            <i class="bi bi-person-plus-fill me-2"></i> Finalizar Registro
                        </button>

                        <div class="text-center mt-3 border-top border-dark pt-3">
                            <span class="text-muted-dark small">¿Ya tienes una cuenta? </span>
                            <a th:href="@{/login}" class="text-electric-blue small fw-semibold text-decoration-none ms-1">Inicia Sesión</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
