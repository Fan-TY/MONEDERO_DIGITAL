<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukita - Recargar Saldo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="min-vh-100 py-3">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-card-dark shadow border-bottom border-dark rounded-4 mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-inline-flex align-items-center text-white me-4" href="/perfil">
            <i class="bi bi-coin text-electric-blue me-2"></i>Lukita
        </a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <a class="nav-link text-muted-dark fw-semibold" href="/perfil">
                        <i class="bi bi-person-circle me-1"></i> Mi Perfil
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active fw-semibold text-white border-bottom border-electric-blue" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-arrow-left-right me-1"></i> Transacciones
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark bg-card-dark border border-dark shadow">
                        <li>
                            <a class="dropdown-item text-white active" href="/recargar">
                                <i class="bi bi-plus-circle-dotted me-2 text-electric-blue"></i> Recargar
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item text-white" href="/retirar">
                                <i class="bi bi-cash-stack me-2 text-electric-blue"></i> Retirar
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex">
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm fw-bold rounded-pill px-3">
                    <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <div th:if="${mensajeExito}" class="alert alert-success bg-success bg-opacity-10 text-success border border-success border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensajeExito}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-10 text-danger border border-danger border-opacity-20 rounded-3 mb-4">
        <i class="bi bi-shield-exclamation me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-7">
            <div class="bg-card-dark p-4 rounded-4 shadow border border-dark">
                <h5 class="mb-4 fw-bold text-white d-flex align-items-center">
                    <i class="bi bi-plus-circle-dotted me-2 text-electric-blue"></i> Recargar Saldo
                </h5>

                <form th:action="@{/recargar}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Cuenta a recargar</label>
                        <select class="form-select bg-dark border-secondary text-white rounded-3" name="numeroCuenta" required>
                            <option value="" disabled selected>Selecciona una cuenta...</option>
                            <option th:each="cuenta : ${cuentas}"
                                    th:value="${cuenta.numeroCuenta}"
                                    th:text="${cuenta.banco} + ' — ' + ${cuenta.numeroCuenta}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Origen de la recarga</label>
                        <select class="form-select bg-dark border-secondary text-white rounded-3" name="tipoOrigen" required>
                            <option value="TARJETA">Tarjeta (débito/crédito)</option>
                            <option value="BANCO">Transferencia bancaria</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted-dark small fw-semibold">Referencia (N° tarjeta, o N° de cuenta si es transferencia)</label>
                        <input type="text" class="form-control bg-dark border-secondary text-white rounded-3"
                               name="referencia" required placeholder="Ej. **** 4521 o número de cuenta"
                               list="listaCuentasReferencia" autocomplete="off">
                        <datalist id="listaCuentasReferencia">
                            <option th:each="c : ${todasLasCuentas}"
                                    th:value="${c.numeroCuenta}"
                                    th:label="${c.banco} + ' — ' + (${c.usuario} != null ? ${c.usuario.nombre} : 'Sin titular')">
                            </option>
                        </datalist>
                        <div class="form-text text-muted-dark small mt-1">
                            <i class="bi bi-info-circle me-1"></i>
                            Si eliges "Transferencia bancaria", la cuenta de origen debe existir en el sistema.
                            Empieza a escribir para ver sugerencias de cuentas registradas.
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted-dark small fw-semibold">Monto a recargar (S/.)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control bg-dark border-secondary text-white rounded-3"
                               name="monto" required placeholder="0.00">
                    </div>

                    <button type="submit" class="btn btn-electric-blue fw-bold rounded-pill px-4 w-100">
                        <i class="bi bi-plus-circle me-1"></i> Confirmar Recarga
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
